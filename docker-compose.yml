services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /app/data/omnistock.db
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - omnistock_data:/app/data

volumes:
  omnistock_data:
